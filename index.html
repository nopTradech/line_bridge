<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนหอพัก</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">
    <p>กำลังเตรียมข้อมูลลงทะเบียน...</p>
    
    <script>
        async function main() {
            try {
                // นำ ID ที่คุณให้มาใส่ตรงนี้
                await liff.init({ liffId: "2009276994-Eu0ZAtYC" }); 

                if (!liff.isLoggedIn()) {
                    liff.login(); // ถ้าเปิดในเบราว์เซอร์ทั่วไป จะเด้งหน้า Login LINE
                } else {
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
            
                    // ลิงก์ Google Form ของคุณ
                    const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScLWMaDECDi4Mu8UL15svgGsTWyeB8VB5lLdlExg5pcSJiLhw/viewform?usp=pp_url&entry.279697382=" + userId;
            
                    // สั่งให้เปลี่ยนหน้า (Redirect)
                    window.location.replace(googleFormUrl);
                }
            } catch (error) {
                console.error("LIFF Error:", error);
                alert("เกิดข้อผิดพลาด: " + error.message);
            }
        }
        main();
    </script>
</body>
</html>
